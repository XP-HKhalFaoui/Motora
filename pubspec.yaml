name: carnet_auto
description: "Carnet Auto — suivi d'entretien automobile (Flutter + Supabase)."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Backend
  supabase_flutter: ^2.5.6

  # State management
  flutter_riverpod: ^2.5.1

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Files / scans
  image_picker: ^1.1.2
  file_picker: ^8.1.2

  # Charts
  fl_chart: ^0.68.0

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.2

  # Design system
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
